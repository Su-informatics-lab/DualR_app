services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:3000"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - env.stage
    volumes:
      - ../backend/models:/app/models:ro
    restart: unless-stopped
